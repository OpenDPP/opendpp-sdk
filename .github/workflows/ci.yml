name: CI

# Builds + verifies the generated SDKs. The TypeScript client under typescript/src/generated is
# COMMITTED and generated from typescript/openapi.json (the version-locked OpenDPP API contract); the
# drift guard regenerates and fails on any diff, so the committed client always matches the spec.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript SDK — generate-drift, typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - run: npm ci

      - name: Drift guard — regenerated client must match the committed src/generated
        run: |
          npm run generate
          if [ -n "$(git status --porcelain -- src/generated)" ]; then
            echo "::error::typescript/src/generated drifted from openapi.json — run \`npm run generate\` and commit (catches new, changed, and removed files)."
            git --no-pager status --porcelain -- src/generated
            exit 1
          fi

      - name: Version lock — package version == contract version
        run: npm run check:version

      - run: npm run typecheck
      - run: npm run build
      - run: npm test
