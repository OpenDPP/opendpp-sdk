name: Auto-close fork PRs

# This repository is a GENERATED MIRROR (the SDKs are generated from the OpenDPP OpenAPI contract,
# whose source of truth is the private opendpp-node backend). Pull requests here cannot be merged into
# the source of truth, so a fork PR is politely closed with a pointer to CONTRIBUTING.md — issues stay
# open as the report door.
#
# SECURITY: pull_request_target runs with repo write access on the BASE repo. This workflow NEVER
# checks out or runs any code from the PR head (the labeler-class RCE footgun) — it only closes the PR
# and posts a comment via the API. No untrusted event field is ${{ }}-interpolated anywhere (including
# the script: block); PR data is read only at runtime via context.payload.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

concurrency:
  group: pr-autoclose-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  autoclose:
    name: Politely close fork PRs
    # Fork PRs only. Same-repo PRs (e.g. Dependabot action bumps, maintainer branches) are legitimate
    # and left untouched.
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Close and comment a pointer
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Close FIRST: the close is the policy, the comment is courtesy — a comment failure
            // (rate limit, spam heuristics) must not leave the wrong-door PR open.
            // Links are ABSOLUTE: GitHub does not rewrite relative links in PR comments, so a
            // relative href would resolve against the /pull/N page URL and 404.
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
            const body = [
              "Thanks for your interest in OpenDPP! 🙏",
              "",
              "**This repository is a generated mirror.** The SDKs here are mechanically generated from",
              "the OpenDPP OpenAPI contract, whose source of truth is the private `opendpp-node` backend —",
              "so changes made in a pull request here can't flow back and would be overwritten on the next",
              "regeneration. That's why fork PRs are closed automatically.",
              "",
              "The doors that **are** open:",
              "",
              "- **Found a bug or want a change?** Please [open an issue](https://github.com/OpenDPP/opendpp-sdk/issues)",
              "  here — issues are welcome and are the right report/proposal door.",
              "- **Hand-authored interop/kit contributions?** PRs are welcome at",
              "  [`OpenDPP/opendpp-interop`](https://github.com/OpenDPP/opendpp-interop).",
              "- **Docs & API reference:** <https://opendpp-node.eu>.",
              "",
              "See [`CONTRIBUTING.md`](https://github.com/OpenDPP/opendpp-sdk/blob/main/CONTRIBUTING.md) for the",
              "full explanation. This PR has been closed automatically — no action needed on your side.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
