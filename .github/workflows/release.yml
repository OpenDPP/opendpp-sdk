name: Release published versions

# Publishes a GitHub Release for every `sdk-ts-<semver>` / `sdk-java-<semver>` version that is ACTUALLY
# LIVE in its registry, with notes from the matching CHANGELOG.md section. Closes the gap where a tag
# triggers a registry publish but no Release is ever created — leaving this repo's history readable only
# as bare tags (OpenDPP #690/C09).
#
# IT DOES NOT CREATE TAGS. Tagging is the deliberate human act that triggers publishing (see
# publish-sdk-ts.yml / publish-sdk-java.yml, both gated by the `release` environment's required
# reviewers). This only gives an already-published version its Release. That differs from the sibling
# opendpp-interop, whose single artifact lets it auto-tag on a version bump; here two artifacts version
# independently, so the tag stays the author's call.
#
# WHY THE REGISTRY IS THE EVIDENCE, not the tag and not the publish job's exit code:
#   - A tag exists the moment it is pushed, BEFORE the publish is approved. Releasing on the tag push
#     would announce a version while the publish sits waiting for a reviewer — or was denied outright.
#   - A publish job can go red AFTER the tag exists. That is not hypothetical here: sdk-ts-1.11.1's
#     first publish FAILED on npm 12's broken provenance and only succeeded 11 minutes later (PR #12).
#     A Release created on the tag push would have announced a version npm did not have.
#   - The Java publish is ASYNCHRONOUS — `publishToMavenCentral` submits and Central auto-releases after
#     validation, so a green job does not yet mean the artifact is on repo1.
# So a Release here means exactly one thing: **this version is live in its registry**. Anything weaker
# and a Release claiming an unpublished version is the same disease as #690 itself — a package that
# never published being indistinguishable from one that did — just pointed the other way.

on:
  # Right after a publish run completes, so the Release follows the artifact closely.
  workflow_run:
    # Matched by workflow NAME (GitHub offers no path form here) — rename either publish workflow and
    # this silently stops firing. The schedule below is what keeps that from being a silent failure.
    workflows: ["Publish @opendpp/sdk (TypeScript)", "Publish opendpp-sdk (Java)"]
    types: [completed]
  # The backstop: Maven Central's validate-then-release is async, so a version can go live minutes after
  # its publish run ends and miss the check above. This sweeps it up without anyone remembering to.
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC — after drift-check (06:00)
  workflow_dispatch:

permissions:
  contents: write # create Releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release every published version that lacks one
    # A failed/denied publish must not produce a Release. (Scheduled and manual runs always proceed —
    # they verify against the registry anyway, which is the real gate.)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out (CHANGELOG.md is the notes source)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main # notes always come from main's CHANGELOG, never a tag's older copy
          fetch-depth: 0

      - name: Create Releases for published versions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;

            // Which artifact a tag names, and how to ask its registry whether the version is really there.
            // Both endpoints are public and unauthenticated.
            const ARTIFACTS = [
              {
                prefix: "sdk-ts-",
                label: "@opendpp/sdk (TypeScript)",
                registry: "npm — https://www.npmjs.com/package/@opendpp/sdk",
                isLive: async (v) => (await fetch(`https://registry.npmjs.org/@opendpp/sdk/${v}`)).status === 200,
              },
              {
                prefix: "sdk-java-",
                label: "opendpp-sdk (Java/Kotlin)",
                registry: "Maven Central — `eu.opendpp-node:opendpp-sdk`",
                isLive: async (v) => (await fetch(`https://repo1.maven.org/maven2/eu/opendpp-node/opendpp-sdk/${v}/`)).status === 200,
              },
            ];

            // The CHANGELOG section for a version: from `## [x.y.z]` to the next `## [`. Both artifacts at
            // the same version share one section on purpose — same contract, same generated surface.
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8").split("\n");
            const sectionFor = (version) => {
              const start = changelog.findIndex((l) => l.startsWith(`## [${version}]`));
              if (start === -1) return null;
              let end = changelog.length;
              for (let i = start + 1; i < changelog.length; i++) {
                if (changelog[i].startsWith("## [")) { end = i; break; }
              }
              return changelog.slice(start + 1, end).join("\n").trim();
            };

            const tags = await github.paginate(github.rest.repos.listTags, { owner, repo, per_page: 100 });
            const releases = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 });
            const released = new Set(releases.map((r) => r.tag_name));

            const created = [], skipped = [], notLive = [], missingNotes = [];
            for (const tag of tags) {
              const art = ARTIFACTS.find((a) => tag.name.startsWith(a.prefix));
              if (!art) continue; // not an SDK release tag
              if (released.has(tag.name)) { skipped.push(tag.name); continue; }

              const version = tag.name.slice(art.prefix.length);

              // The gate. A tag whose artifact is not in the registry is either mid-flight (approval
              // pending, Central still validating) or a publish that failed — never something to
              // announce. It is picked up by the next run once it is genuinely live.
              if (!(await art.isLive(version))) { notLive.push(tag.name); continue; }

              const section = sectionFor(version);
              if (!section) {
                // Never invent notes. A published version with no CHANGELOG entry is a real omission —
                // report it rather than publishing an empty or fabricated Release.
                missingNotes.push(tag.name);
                continue;
              }

              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag.name,
                name: `${art.label} ${version}`,
                body: [
                  `**${art.label} ${version}** — ${art.registry}`,
                  "",
                  section,
                  "",
                  "---",
                  `Full changelog: https://github.com/${owner}/${repo}/blob/main/CHANGELOG.md`,
                ].join("\n"),
                draft: false,
                prerelease: false,
              });
              created.push(tag.name);
            }

            const summary = [
              "## Releases",
              "",
              `- created: ${created.length}${created.length ? ` — ${created.join(", ")}` : ""}`,
              `- already released: ${skipped.length}`,
              ...(notLive.length ? ["", `- ⏳ tagged but NOT yet in its registry, so not announced: ${notLive.join(", ")}`,
                                    "  (approval pending, Central still validating, or the publish failed — a later run picks it up)"] : []),
              ...(missingNotes.length ? ["", `- ⚠️ published but NO CHANGELOG entry, skipped: ${missingNotes.join(", ")}`] : []),
            ].join("\n");
            await core.summary.addRaw(summary).write();
            console.log(summary);

            // A live version with no notes is a gap someone must close by hand.
            if (missingNotes.length) core.warning(`Published with no CHANGELOG entry: ${missingNotes.join(", ")}`);
