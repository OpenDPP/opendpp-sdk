name: Publish @opendpp/sdk (TypeScript)

# Publishes @opendpp/sdk to npm (keyless — OIDC trusted publishing, no NODE_AUTH_TOKEN) when a
# `sdk-ts-<semver>` tag is pushed. The tag must match typescript/package.json's version, which is
# version-locked to the OpenDPP API contract (openapi.json info.version). Provenance is automatic
# (public repo + public package). Setup: configure the npm Trusted Publisher for @opendpp/sdk
# (org OpenDPP, repo opendpp-sdk, workflow publish-sdk-ts.yml, environment release) and add a
# `sdk-ts-*` deployment tag rule to this repo's `release` environment.

on:
  push:
    tags:
      - "sdk-ts-*" # e.g. sdk-ts-1.6.0
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC — the npm trusted-publishing anchor

concurrency:
  group: publish-sdk-ts
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish @opendpp/sdk
    runs-on: ubuntu-latest
    environment: release # must match the npm Trusted Publisher config
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/sdk-ts-')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-ts-}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME implies $TAG_VERSION but package.json is $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      - name: Drift + version guard — publish only spec-faithful, version-locked output
        run: |
          npm run check:drift
          npm run check:version

      - run: npm run build
      - run: npm test
      - name: Publish (keyless via OIDC; provenance automatic)
        run: npm publish
