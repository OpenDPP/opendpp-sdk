name: Publish opendpp-sdk (Java)

# Publishes eu.opendpp-node:opendpp-sdk to Maven Central (via the Central Portal) when a
# `sdk-java-<semver>` tag is pushed. The tag must match the Gradle project version, which is DERIVED
# from java/openapi.json's info.version (major.minor version-locked to the OpenDPP API contract; the
# patch digit is the SDK-only fix lane via `sdkPatch` in build.gradle.kts). Maven Central has
# no OIDC trusted publishing, so this is credentialed: a Central Portal user token + a GPG signing key,
# supplied as `release`-environment secrets. With automaticRelease=true (see build.gradle.kts), a
# deployment that passes Central Portal validation releases automatically — the same one-gate flow as
# the TypeScript SDK: the `release` environment's required reviewers are the approval.
#
# Required `release`-environment secrets:
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD — a Central Portal user token (Account → Generate
#     User Token), NOT the portal login.
#   GPG_SIGNING_KEY      — the ASCII-armored GPG *private* key (`gpg --armor --export-secret-keys`),
#     whose public key is published to a keyserver.
#   GPG_SIGNING_PASSWORD — that key's passphrase.

on:
  push:
    tags:
      - "sdk-java-*" # e.g. sdk-java-1.11.0
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-sdk-java
  cancel-in-progress: false

jobs:
  publish:
    name: Maven Central publish eu.opendpp-node:opendpp-sdk
    runs-on: ubuntu-latest
    environment: release # required reviewers gate the run
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Verify the tag matches the project version
        if: startsWith(github.ref, 'refs/tags/sdk-java-')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-java-}"
          PROJECT_VERSION="$(./gradlew -q printVersion)"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME implies $TAG_VERSION but project version is $PROJECT_VERSION"
            exit 1
          fi

      - name: Drift guard — publish only spec-faithful output
        # Wipe first so removals are caught too (openApiGenerate never deletes files).
        run: |
          rm -rf src/main/java
          ./gradlew openApiGenerate
          if [ -n "$(git status --porcelain -- src/main/java)" ]; then
            echo "::error::generated client drifted from openapi.json — run \`rm -rf src/main/java && ./gradlew openApiGenerate\` and commit."
            git --no-pager status --porcelain -- src/main/java
            exit 1
          fi

      - run: ./gradlew build

      - name: Publish to Maven Central (Central Portal; GPG-signed, auto-released after validation)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache
