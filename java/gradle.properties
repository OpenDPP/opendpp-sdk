# Reproducible, quiet builds. Publishing credentials and the GPG signing key are injected in CI as
# Gradle project properties via environment variables (ORG_GRADLE_PROJECT_mavenCentralUsername,
# ORG_GRADLE_PROJECT_mavenCentralPassword, ORG_GRADLE_PROJECT_signingInMemoryKey,
# ORG_GRADLE_PROJECT_signingInMemoryKeyPassword) — NEVER committed here. See README ("Publishing").
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false
